# Path: .azure/azure-pipelines.yml
# Deploys the modular Docker Compose stack via dc.sh.
# Supports both ubuntu-latest and windows-latest agents.

name: dockerstack-agycli-auth

trigger: none
schedules:
  - cron: "55 * * * *"
    displayName: "Run every 55 minutes"
    always: true
    branches:
      include:
        - main
variables:
  STOP_RUNNER_ID: "$(Build.BuildId)-$(System.JobAttempt)"
  STOP_LISTENER_ENABLED: "true"
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"
pool:
  # ✅ Đổi ở đây để chọn runner: ubuntu-latest | windows-latest
  vmImage: "ubuntu-latest"

jobs:
  - job: main
    # https://dev.azure.com/jjpaulinzonemailclpccdedu/o22zalo
    # https://dev.azure.com/asregister/o22zalo/_git/dockerstack-omniroute
    # https://dev.azure.com/jjpaulinzonemailclpccdedu/o22zalo/_git/dockerstack-agycli-auth
    # https://asregister@dev.azure.com/asregister/o22zalo/_git/dockerstack-agycli-auth
    condition: >-
      or(
        and(
          contains(variables['System.CollectionUri'], 'asregister'),
          eq(variables['System.TeamProject'], 'o22zalo'),
          eq(variables['Build.Repository.Name'], 'dockerstack-agycli-auth')
        ),
        and(
          contains(variables['System.CollectionUri'], 'asregister'),
          eq(variables['System.TeamProject'], 'o22zalo'),
          eq(variables['Build.Repository.Name'], 'dockerstack-omniroute')
        ),
        and(
          contains(variables['System.CollectionUri'], 'jjpaulinzonemailclpccdedu'),
          eq(variables['System.TeamProject'], 'o22zalo'),
          eq(variables['Build.Repository.Name'], 'dockerstack-agycli-auth')
        )
      )
    steps:
      - checkout: self
        displayName: "Checkout"

      # ── Step 1: Pull .env + credentials from RTDB ─────────────
      - bash: bash .github/scripts/pull-env.sh
        displayName: "Pull .env & credentials from RTDB"
        env:
          DOTENVRTDB_URL: $(DOTENVRTDB_URL)

      # ── Step 2: Detect OS → append vars to .env ───────────────
      - bash: dotenvrtdb -e .env -- bash .github/scripts/detect-os.sh
        displayName: "Detect OS environment"

      # ── Step 3: OS-specific setup ─────────────────────────────
      - bash: dotenvrtdb -e .env -- bash .github/scripts/setup-linux.sh
        displayName: "Setup environment (Linux)"

      # ── Step 4: Validate config ────────────────────────────────
      - bash: dotenvrtdb -e .env -- node docker-compose/scripts/validate-env.js
        displayName: "Validate env"

      # ── Step 4.1 (NEW): Restore BuildKit local cache ──────────
      - task: Cache@2
        displayName: "Restore Docker Buildx local cache"
        inputs:
          key: 'docker-buildx | "$(Agent.OS)" | "$(Build.Repository.Name)"'
          restoreKeys: |
            docker-buildx | "$(Agent.OS)"
          path: $(Pipeline.Workspace)/.buildx-cache

      # ── Step 4.2 (NEW): Build app + agy-dev với local cache ───
      - bash: |
          set -euo pipefail

          # Tag image khớp với compose (${PROJECT_NAME:-myapp}-<svc>:local)
          PN=$(grep -E '^PROJECT_NAME=' .env | head -1 | cut -d= -f2- || true)
          PN=${PN//\"/}
          PN=${PN//\'/}
          PN=${PN:-myapp}
          echo "PROJECT_NAME resolved: $PN"

          CACHE_DIR="$(Pipeline.Workspace)/.buildx-cache"
          CACHE_NEW="$(Pipeline.Workspace)/.buildx-cache-new"
          mkdir -p "$CACHE_DIR" "$CACHE_NEW"

          docker buildx create --use --name ci-builder 2>/dev/null || docker buildx use ci-builder

          build_one() {
            local svc="$1"
            local ctx="$2"
            docker buildx build \
              --file "$ctx/Dockerfile" \
              --tag "${PN}-${svc}:local" \
              --cache-from "type=local,src=${CACHE_DIR}/${svc}" \
              --cache-to   "type=local,dest=${CACHE_NEW}/${svc},mode=max" \
              --load \
              "$ctx"
          }

          build_one app     services/app
          build_one agy-dev services/agy-dev

          # Xoay cache mới về vị trí chính (tránh cache phình to mỗi run)
          rm -rf "$CACHE_DIR"
          mv "$CACHE_NEW" "$CACHE_DIR"
        displayName: "Build app & agy-dev (Buildx local cache)"

      # ── Step 5: Deploy via dc.sh (KHÔNG dùng --build mặc định) ─
      # app & agy-dev đã build sẵn, tag khớp compose → compose chỉ build service còn lại,
      # app/agy-dev hit cache local nên nhanh.
      - bash: |
          dotenvrtdb -e .env -- bash docker-compose/scripts/dc.sh up -d --build --remove-orphans
        displayName: "Build & start services (Linux)"

      # ── Step 6: Cleanup có điều kiện (KHÔNG prune toàn bộ) ─────
      - bash: docker image prune -f --filter "until=72h"
        displayName: "Clean up old images only (>72h)"

      - bash: |
          dotenvrtdb -e .env -- dotenvrtdb runner set-stoprunnerid
          dotenvrtdb -e .env -- dotenvrtdb runner keepalive
        displayName: "dotenvrtdb runner keepalive + set-stoprunnerid"

      # ── Step 7: Collect artifacts (always) ────────────────────
      - bash: dotenvrtdb -e .env -- bash .github/scripts/collect-artifacts.sh
        displayName: "Collect docker runtime artifacts (Linux)"
        condition: always()

      - task: PublishPipelineArtifact@1
        displayName: "Upload docker runtime artifacts"
        condition: always()
        inputs:
          targetPath: "artifacts/docker-runtime"
          artifact: "docker-runtime"
          publishLocation: pipeline
